openapi: 3.1.0
info:
  title: CapCutAI Backend-AI Internal API
  version: 0.1.0
  description: Minimal internal contract between Spring Boot backend and FastAPI AI service.

paths:
  /internal/health:
    get:
      summary: AI service health check
      responses:
        "200":
          description: AI service is healthy

  /internal/agent/respond:
    post:
      summary: Generate one assistant reply for a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRespondRequest"
      responses:
        "200":
          description: Assistant reply generated by the configured provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRespondResponse"

components:
  schemas:
    MessageModel:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          example: USER
        content:
          type: string
          example: 帮我总结一下这个会话

    AgentRespondRequest:
      type: object
      required:
        - conversationId
        - messages
      properties:
        conversationId:
          type: string
          example: conv_demo_001
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MessageModel"
        context:
          type: object
          additionalProperties: true
          description: Optional context bag for future tool/plugin state.

    ReplyModel:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          example: ASSISTANT
        content:
          type: string
          example: Hello! How can I assist you with CapCut today?

    AgentRespondResponse:
      type: object
      required:
        - reply
        - status
        - trace
        - artifacts
      properties:
        reply:
          $ref: "#/components/schemas/ReplyModel"
        status:
          type: string
          example: completed
        trace:
          type: array
          items:
            type: string
          example:
            - received conversation payload
            - selected langgraph agent flow
            - graph.generate_reply.ollama
            - returned assistant reply
        artifacts:
          type: object
          additionalProperties: true
